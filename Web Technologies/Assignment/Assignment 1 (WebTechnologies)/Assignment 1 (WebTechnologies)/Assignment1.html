<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment 1</title>
</head>
<body>

    <!-- 1. Largest Heading -->
    <h1>Welcome</h1>

    <!-- 2. Second Highest Heading -->
    <h2>About Us</h2>

    <!-- 3. Third Highest Heading Center Aligned -->
    <h3 align="center">Welcome To HTML</h3>

    <!-- 4. Heading with Text Color -->
    <h2 style="color:#0066cc;">Services</h2>

    <!-- 5. Underlined Heading with Font Color -->
    <h3 style="color:#ff0000;">
        <u>Important</u>
    </h3>

    <!-- 6. Text Input Field -->
    <label>Name:</label>
    <input type="text">

    <br><br>

    <!-- 7. Password Input Field -->
    <label>Password:</label>
    <input type="password" placeholder="Enter your password">

    <br><br>

    <!-- 8. Checkbox with Label -->
    <input type="checkbox" id="agree">
    <label for="agree">I Agree</label>

    <br><br>

    <!-- 9. Audio File in MP3 Format -->
    <audio controls>
        <source src="music.mp3" type="audio/mp3">
        Your browser does not support the audio element.
    </audio>

    <br><br>

    <!-- 10. Unordered List -->
    <ul>
        <li>Red</li>
        <li>Blue</li>
    </ul>

</body>
</html>
